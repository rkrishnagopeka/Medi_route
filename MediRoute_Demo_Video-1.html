<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediRoute — Cinematic Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Georgia', serif; cursor: none; }
  #stage { position: relative; width: 100vw; height: 100vh; }
  canvas { position: absolute; top: 0; left: 0; display: block; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

  /* Controls */
  #controls {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 18px; z-index: 999;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 50px;
    padding: 10px 24px; pointer-events: all;
  }
  #controls button {
    background: none; border: none; color: #fff; cursor: pointer;
    font-size: 20px; opacity: 0.85; transition: opacity 0.2s;
  }
  #controls button:hover { opacity: 1; }
  #progress-bar { width: 220px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 3px; cursor: pointer; }
  #progress-fill { height: 100%; background: #00C2FF; border-radius: 3px; width: 0%; transition: width 0.1s; }
  #time-label { color: rgba(255,255,255,0.6); font-size: 12px; font-family: monospace; min-width: 60px; }
  #scene-label { color: rgba(0,194,255,0.9); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; min-width: 120px; }

  /* Custom cursor */
  #cursor { position: fixed; width: 12px; height: 12px; background: rgba(0,194,255,0.8);
    border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%);
    transition: transform 0.1s; mix-blend-mode: screen; }

  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap');
</style>
</head>
<body>
<div id="stage">
  <canvas id="bg"></canvas>
  <canvas id="main"></canvas>
  <div id="ui"></div>
</div>

<div id="controls">
  <button id="btnPlay" title="Play/Pause">⏸</button>
  <button id="btnRestart" title="Restart">⏮</button>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="time-label">0:00</span>
  <span id="scene-label">Opening</span>
</div>
<div id="cursor"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// SETUP
// ─────────────────────────────────────────────────────────────────────────────
const bgCanvas  = document.getElementById('bg');
const mainCanvas= document.getElementById('main');
const bgCtx     = bgCanvas.getContext('2d');
const ctx       = mainCanvas.getContext('2d');

function resize() {
  [bgCanvas, mainCanvas].forEach(c => {
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
  });
}
resize();
window.addEventListener('resize', resize);

// Cursor
const cursor = document.getElementById('cursor');
window.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ─────────────────────────────────────────────────────────────────────────────
// TIMELINE  — each scene: { start, end, name, draw(t, progress) }
// t = absolute elapsed seconds, progress = 0..1 within scene
// ─────────────────────────────────────────────────────────────────────────────
const TOTAL_DURATION = 120; // 2 minutes

let elapsed   = 0;
let lastTime  = null;
let playing   = true;
let rafId     = null;

// ── Color palette ─────────────────────────────────────────────────────────────
const C = {
  navy:   '#061A40', royalBlue:'#0B2D6B',
  cyan:   '#00C2FF', mint:     '#00E5B0',
  orange: '#FF6B35', white:    '#FFFFFF',
  cream:  '#F0E8D8', dust:     '#C4A882',
  sky:    '#87CEEB', sunset:   '#FF8C42',
  green:  '#4CAF50', red:      '#E53935',
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t) { return 1-(1-t)*(1-t); }
function easeIn(t) { return t * t; }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function alpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

const W = () => mainCanvas.width;
const H = () => mainCanvas.height;

// ── Stars ─────────────────────────────────────────────────────────────────────
const stars = Array.from({length:200}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random()*1.5+0.3, twinkle: Math.random()*Math.PI*2
}));

function drawStars(ctx, opacity=1, t=0) {
  stars.forEach(s => {
    const tw = 0.5 + 0.5*Math.sin(s.twinkle + t*0.8);
    ctx.beginPath();
    ctx.arc(s.x*W(), s.y*H()*0.6, s.r*tw, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${opacity * tw * 0.7})`;
    ctx.fill();
  });
}

// ── Particle system ────────────────────────────────────────────────────────────
class Particles {
  constructor(n, opts={}) {
    this.opts = { color: '#00C2FF', size: 3, speed: 0.3, life: 2, ...opts };
    this.particles = Array.from({length:n}, () => this.spawn());
  }
  spawn() {
    const o = this.opts;
    return {
      x: o.x !== undefined ? o.x : Math.random()*W(),
      y: o.y !== undefined ? o.y : Math.random()*H(),
      vx: (Math.random()-0.5)*o.speed*60,
      vy: (Math.random()-0.5)*o.speed*60 - 20,
      r: Math.random()*o.size + 1,
      life: Math.random()*o.life, maxLife: o.life,
      color: o.color
    };
  }
  update(dt) {
    this.particles.forEach(p => {
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.life -= dt;
      if (p.life <= 0) Object.assign(p, this.spawn(), {life: p.maxLife});
    });
  }
  draw(ctx, globalAlpha=1) {
    this.particles.forEach(p => {
      const a = clamp(p.life/p.maxLife,0,1) * globalAlpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = alpha(p.color || '#00C2FF', a);
      ctx.fill();
    });
  }
}

// ── Text helpers ───────────────────────────────────────────────────────────────
function drawText(ctx, text, x, y, opts={}) {
  const { size=24, font='Lato, sans-serif', color='#fff', align='center',
          alpha:a=1, bold=false, italic=false, shadow=false, letterSpacing=0 } = opts;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = color;
  ctx.font = `${italic?'italic ':''} ${bold?'bold ':''} ${size}px ${font}`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  if (shadow) {
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 20;
  }
  if (letterSpacing > 0) {
    const chars = text.split('');
    let cx = align === 'center' ? x - ctx.measureText(text).width/2 : x;
    chars.forEach(ch => {
      ctx.fillText(ch, cx, y);
      cx += ctx.measureText(ch).width + letterSpacing;
    });
  } else {
    ctx.fillText(text, x, y);
  }
  ctx.restore();
}

function fadeText(ctx, text, x, y, progress, opts={}) {
  const p = clamp(progress, 0, 1);
  const fadeIn  = clamp(p/0.2,   0, 1);
  const fadeOut = clamp((1-p)/0.15, 0, 1);
  const a = Math.min(fadeIn, fadeOut) * (opts.maxAlpha||1);
  const offsetY = (1-easeOut(fadeIn))*20;
  drawText(ctx, text, x, y + offsetY, {...opts, alpha: a});
}

// ── Cinematic bars ─────────────────────────────────────────────────────────────
function cinematicBars(ctx, ratio=0.08) {
  const bh = H()*ratio;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W(), bh);
  ctx.fillRect(0, H()-bh, W(), bh);
}

// ── Film grain ────────────────────────────────────────────────────────────────
let grainCanvas = document.createElement('canvas');
let grainCtx = grainCanvas.getContext('2d');
function updateGrain() {
  grainCanvas.width = W(); grainCanvas.height = H();
  const id = grainCtx.createImageData(W(), H());
  for (let i = 0; i < id.data.length; i += 4) {
    const v = Math.random() * 30;
    id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=18;
  }
  grainCtx.putImageData(id, 0, 0);
}
updateGrain();

// ── UI Phone frame ────────────────────────────────────────────────────────────
function drawPhone(ctx, cx, cy, w, h, opts={}) {
  const { corner=24, borderColor='#00C2FF', borderWidth=2, screenColor='#061A40',
          glowColor='#00C2FF', glow=true } = opts;
  ctx.save();
  if (glow) {
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 30;
  }
  // body
  ctx.beginPath();
  roundRect(ctx, cx-w/2, cy-h/2, w, h, corner);
  ctx.fillStyle = '#0a0e1a';
  ctx.fill();
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = borderWidth;
  ctx.stroke();
  // screen
  ctx.shadowBlur = 0;
  ctx.beginPath();
  roundRect(ctx, cx-w/2+6, cy-h/2+20, w-12, h-40, corner-4);
  ctx.fillStyle = screenColor;
  ctx.fill();
  // notch
  ctx.beginPath();
  ctx.arc(cx, cy-h/2+12, 6, 0, Math.PI*2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawCard(ctx, x, y, w, h, opts={}) {
  const { r=12, fill='rgba(11,45,107,0.9)', stroke='rgba(0,194,255,0.5)', sw=1, shadow=true } = opts;
  ctx.save();
  if (shadow) { ctx.shadowColor='rgba(0,194,255,0.3)'; ctx.shadowBlur=20; }
  ctx.beginPath(); roundRect(ctx,x,y,w,h,r);
  ctx.fillStyle=fill; ctx.fill();
  ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke();
  ctx.restore();
}

// ── Map elements ──────────────────────────────────────────────────────────────
function drawMapPin(ctx, x, y, color='#FF6B35', pulse=0) {
  if (pulse > 0) {
    ctx.beginPath();
    ctx.arc(x, y, 16+pulse*20, 0, Math.PI*2);
    ctx.fillStyle = alpha(color, 0.15*(1-pulse));
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(x, y, 10, 0, Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, y+10);
  ctx.lineTo(x-7, y+1);
  ctx.lineTo(x+7, y+1);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

// ─────────────────────────────────────────────────────────────────────────────
// SCENE DEFINITIONS
// ─────────────────────────────────────────────────────────────────────────────

// Noise helper
function noise(x, y, t) {
  return Math.sin(x*0.5+t)*Math.cos(y*0.3+t*0.7)*0.5+0.5;
}

const scenes = [

  // ── SCENE 0: LOGO INTRO (0–5s) ───────────────────────────────────────────
  {
    start: 0, end: 5, name: 'Intro',
    draw(t, p) {
      // Black with logo reveal
      ctx.fillStyle = '#000';
      ctx.fillRect(0,0,W(),H());

      // Pulse rings
      for (let i=0;i<3;i++) {
        const pr = (p + i/3) % 1;
        ctx.beginPath();
        ctx.arc(W()/2, H()/2, 60+pr*120, 0, Math.PI*2);
        ctx.strokeStyle = alpha(C.cyan, 0.3*(1-pr));
        ctx.lineWidth = 2; ctx.stroke();
      }

      // Cross / medical icon
      const cx=W()/2, cy=H()/2;
      const sz = easeOut(p) * 40;
      ctx.fillStyle = C.cyan;
      ctx.fillRect(cx-sz*0.3, cy-sz, sz*0.6, sz*2);
      ctx.fillRect(cx-sz, cy-sz*0.3, sz*2, sz*0.6);

      // "MediRoute" reveal
      const textA = clamp((p-0.4)/0.4, 0, 1);
      drawText(ctx, 'MEDIROUTE', W()/2, H()/2+120, {
        size: 52, bold:true, font:'Cinzel, Georgia, serif',
        color: C.white, alpha: textA, letterSpacing: 8
      });
      drawText(ctx, 'AI-Powered Healthcare Lifeline', W()/2, H()/2+165, {
        size: 18, font:'Lato, sans-serif',
        color: C.cyan, alpha: textA*0.8, letterSpacing: 3
      });
      cinematicBars(ctx);
    }
  },

  // ── SCENE 1: RURAL VILLAGE — GOLDEN HOUR (5–20s) ─────────────────────────
  {
    start: 5, end: 20, name: 'The Problem',
    draw(t, p) {
      const localT = t - 5;

      // Sky gradient — warm sunset
      const sky = ctx.createLinearGradient(0,0,0,H());
      sky.addColorStop(0, '#1a0a2e');
      sky.addColorStop(0.35, '#8B2252');
      sky.addColorStop(0.6, '#FF8C42');
      sky.addColorStop(1, '#C4A882');
      ctx.fillStyle = sky;
      ctx.fillRect(0,0,W(),H());

      // Stars fading in
      drawStars(ctx, clamp(1-p*3, 0, 1)*0.6, t);

      // Sun near horizon
      const sunY = H()*0.62 - (1-p)*H()*0.05;
      const sunGlow = ctx.createRadialGradient(W()*0.72, sunY, 0, W()*0.72, sunY, 120);
      sunGlow.addColorStop(0, 'rgba(255,220,100,0.9)');
      sunGlow.addColorStop(0.3,'rgba(255,140,66,0.4)');
      sunGlow.addColorStop(1,'rgba(255,140,66,0)');
      ctx.fillStyle = sunGlow;
      ctx.fillRect(0,0,W(),H());

      // Ground
      const ground = ctx.createLinearGradient(0,H()*0.6,0,H());
      ground.addColorStop(0,'#8B6914');
      ground.addColorStop(0.4,'#6B4F0E');
      ground.addColorStop(1,'#3D2C06');
      ctx.fillStyle = ground;
      ctx.fillRect(0,H()*0.6,W(),H()*0.4);

      // Dirt road
      ctx.beginPath();
      ctx.moveTo(W()*0.35, H()); ctx.lineTo(W()*0.45, H()*0.62);
      ctx.lineTo(W()*0.55, H()*0.62); ctx.lineTo(W()*0.65, H());
      ctx.fillStyle='rgba(160,120,50,0.8)'; ctx.fill();

      // Simple huts
      function drawHut(hx, hy, sz) {
        ctx.fillStyle='#6B4526';
        ctx.fillRect(hx-sz*0.6,hy-sz*0.5,sz*1.2,sz*0.5);
        ctx.beginPath();
        ctx.moveTo(hx-sz*0.8,hy-sz*0.5);
        ctx.lineTo(hx,hy-sz*1.1);
        ctx.lineTo(hx+sz*0.8,hy-sz*0.5);
        ctx.closePath();
        ctx.fillStyle='#8B5A2B'; ctx.fill();
        // window flicker
        ctx.fillStyle='rgba(255,200,80,0.6)';
        ctx.fillRect(hx-sz*0.15,hy-sz*0.4,sz*0.3,sz*0.25);
      }
      drawHut(W()*0.18, H()*0.73, 70);
      drawHut(W()*0.32, H()*0.76, 55);
      drawHut(W()*0.68, H()*0.74, 65);
      drawHut(W()*0.82, H()*0.77, 50);

      // Acacia trees
      function tree(tx,ty) {
        ctx.fillStyle='#3D1C00';
        ctx.fillRect(tx-4, ty, 8, 50);
        ctx.beginPath();
        ctx.ellipse(tx, ty, 45, 20, 0, 0, Math.PI*2);
        ctx.fillStyle='rgba(40,80,20,0.8)'; ctx.fill();
      }
      tree(W()*0.1, H()*0.62); tree(W()*0.25,H()*0.64);
      tree(W()*0.75,H()*0.63); tree(W()*0.9,H()*0.61);

      // Patient figure — walking slowly, hunched
      const walkX = W()*0.48 + Math.sin(localT*0.5)*5;
      const walkY = H()*0.72;
      const bodySwing = Math.sin(localT*1.2)*3;

      // shadow
      ctx.beginPath();
      ctx.ellipse(walkX, walkY+38, 18, 6, 0, 0, Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fill();

      // body
      ctx.save();
      ctx.translate(walkX, walkY);
      ctx.rotate(bodySwing*0.03);
      // legs
      ctx.strokeStyle='#5D3317'; ctx.lineWidth=6; ctx.lineCap='round';
      const legL = Math.sin(localT*1.2);
      ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(-10+legL*8, 38); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(10-legL*8, 38); ctx.stroke();
      // torso — hunched
      ctx.beginPath();
      ctx.moveTo(0,10); ctx.lineTo(-8,-18);
      ctx.strokeStyle='#8B5A2B'; ctx.lineWidth=8; ctx.stroke();
      // arm with walking stick
      ctx.beginPath(); ctx.moveTo(-8,-10); ctx.lineTo(-22+legL*4, 30);
      ctx.strokeStyle='#5D3317'; ctx.lineWidth=4; ctx.stroke();
      // head
      ctx.beginPath(); ctx.arc(-10,-26,12,0,Math.PI*2);
      ctx.fillStyle='#8B6340'; ctx.fill();
      // cloth
      ctx.beginPath();
      ctx.moveTo(-8,-18); ctx.lineTo(-18,8); ctx.lineTo(8,8); ctx.lineTo(5,-18);
      ctx.fillStyle='rgba(180,150,100,0.9)'; ctx.fill();
      ctx.restore();

      // Dust particles drifting
      for(let i=0;i<12;i++) {
        const dx = (Math.sin(localT*0.3+i*0.8)*0.5+0.5)*W();
        const dy = H()*0.65 + Math.cos(i*1.2+localT*0.2)*30;
        ctx.beginPath();
        ctx.arc(dx, dy, Math.random()*3+1,0,Math.PI*2);
        ctx.fillStyle=`rgba(196,168,130,${0.1+Math.random()*0.2})`; ctx.fill();
      }

      // "No clinic nearby" thought bubble
      if (p > 0.3) {
        const ta = clamp((p-0.3)/0.2,0,1) * clamp((0.9-p)/0.1,0,1);
        ctx.save(); ctx.globalAlpha = ta;
        ctx.beginPath(); roundRect(ctx, W()*0.22, H()*0.32, 260, 110, 16);
        ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fill();
        ctx.strokeStyle='rgba(229,57,53,0.7)'; ctx.lineWidth=1.5; ctx.stroke();
        // bubble tail
        ctx.beginPath(); ctx.moveTo(W()*0.38,H()*0.42); ctx.lineTo(walkX-20,walkY-32); ctx.lineTo(W()*0.41,H()*0.42);
        ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fill();
        drawText(ctx,'❓ Where is the nearest', W()*0.35, H()*0.36, {size:14,color:'#fff',alpha:1});
        drawText(ctx,'clinic? Is it open?', W()*0.35, H()*0.38+14, {size:14,color:'#fff',alpha:1});
        drawText(ctx,'Do they have medicine?', W()*0.35, H()*0.38+32, {size:14,color:'rgba(255,120,120,1)',alpha:1});
        ctx.restore();
      }

      // "No connectivity" icon
      if (p > 0.5) {
        const ia = clamp((p-0.5)/0.15,0,1);
        ctx.save(); ctx.globalAlpha=ia;
        ctx.fillStyle='rgba(229,57,53,0.9)';
        ctx.font='bold 22px sans-serif'; ctx.textAlign='center';
        ctx.fillText('📵  No Signal', W()*0.78, H()*0.45);
        ctx.restore();
      }

      // Caption
      if (p > 0.15) {
        const ca = clamp((p-0.15)/0.1,0,1) * clamp((1-p)/0.1,0,1);
        drawText(ctx, '4.6 Billion people lack access to essential healthcare.',
          W()/2, H()*0.88, {size:18,color:C.cream,alpha:ca,shadow:true,font:'Lato,sans-serif'});
      }

      cinematicBars(ctx);
      ctx.drawImage(grainCanvas,0,0);

      // Vignette
      const vig = ctx.createRadialGradient(W()/2,H()/2,H()*0.2,W()/2,H()/2,H()*0.8);
      vig.addColorStop(0,'rgba(0,0,0,0)');
      vig.addColorStop(1,'rgba(0,0,0,0.6)');
      ctx.fillStyle=vig; ctx.fillRect(0,0,W(),H());
    }
  },

  // ── SCENE 2: TRANSITION — PHONE DISCOVERY (20–30s) ────────────────────────
  {
    start: 20, end: 30, name: 'Discovery',
    draw(t, p) {
      // Background fades from warm village to navy
      const blend = easeInOut(p);
      const bg = ctx.createLinearGradient(0,0,0,H());
      bg.addColorStop(0, `rgba(${lerp(26,6,blend)},${lerp(10,26,blend)},${lerp(46,64,blend)},1)`);
      bg.addColorStop(1, `rgba(${lerp(100,6,blend)},${lerp(60,26,blend)},${lerp(20,40,blend)},1)`);
      ctx.fillStyle=bg; ctx.fillRect(0,0,W(),H());

      drawStars(ctx, blend*0.5, t);

      // Glowing hands holding phone — enters from bottom
      const phoneY = H()/2 + (1-easeOut(clamp(p/0.4,0,1)))*H()*0.4;
      const phoneScale = 0.6 + easeOut(clamp(p/0.4,0,1))*0.4;
      const pw=220*phoneScale, ph=440*phoneScale;

      ctx.save();
      ctx.translate(W()/2, phoneY);
      ctx.scale(phoneScale, phoneScale);

      // Glow halo
      const halo = ctx.createRadialGradient(0,0,0,0,0,220);
      halo.addColorStop(0,`rgba(0,194,255,${0.2*p})`);
      halo.addColorStop(1,'rgba(0,194,255,0)');
      ctx.fillStyle=halo;
      ctx.fillRect(-220,-220,440,440);

      drawPhone(ctx, 0, 0, 220, 440, {borderColor:C.cyan, screenColor:'#04102e'});

      // App loading on screen

        {angle:126, r:200, icon:'🏫', label:'Schools', sub:'3 features', color:'#9C27B0', delay:0.34},

      ];
      nodes.forEach(n=>{
        const na=clamp((p-n.delay)/0.15,0,1);

        const rad=n.angle*Math.PI/180;

        // Connecting line
        ctx.save(); ctx.globalAlpha=na*0.5;

        ctx.lineTo(nx,ny);
        ctx.strokeStyle=n.color; ctx.lineWidth=1.5; ctx.setLineDash([6,4]); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();

        // Node
        ctx.save(); ctx.globalAlpha=na;
        ctx.beginPath(); ctx.arc(nx,ny,40,0,Math.PI*2);
        ctx.fillStyle=`rgba(6,26,64,0.95)`; ctx.fill();
        ctx.strokeStyle=n.color; ctx.lineWidth=2; ctx.stroke();

      cinematicBars(ctx,0.06);
      ctx.drawImage(grainCanvas,0,0,W(),H());

      // Final fade to black at very end
      if(p>0.9){

            {size:16,color:C.cyan,alpha:fa*0.8,letterSpacing:3});
        }
      }
    }
  },
];

// ─────────────────────────────────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────────────────────────────────
function getCurrentScene() {
  return scenes.find(s => elapsed >= s.start && elapsed < s.end) || scenes[scenes.length-1];
}

function render(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;

  if (playing) {
    elapsed += dt;
    if (elapsed >= TOTAL_DURATION) { elapsed = TOTAL_DURATION; playing = false; }
  }

  // Update grain occasionally
  if (Math.floor(elapsed*12) !== Math.floor((elapsed-dt)*12)) updateGrain();

  // Clear
  ctx.clearRect(0,0,W(),H());
  bgCtx.clearRect(0,0,W(),H());

  // Draw current scene
  const scene = getCurrentScene();
  const progress = clamp((elapsed - scene.start) / (scene.end - scene.start), 0, 1);
  scene.draw(elapsed, progress);

  // UI updates
  const pct = (elapsed / TOTAL_DURATION * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  const mm = Math.floor(elapsed/60).toString().padStart(1,'0');
  const ss = Math.floor(elapsed%60).toString().padStart(2,'0');
  document.getElementById('time-label').textContent = `${mm}:${ss}`;
  document.getElementById('scene-label').textContent = scene.name;
  document.getElementById('btnPlay').textContent = playing ? '⏸' : '▶';

  rafId = requestAnimationFrame(render);
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', () => {
  if (elapsed >= TOTAL_DURATION) { elapsed = 0; }
  playing = !playing;
  if (playing) lastTime = null;
});
document.getElementById('btnRestart').addEventListener('click', () => {
  elapsed = 0; lastTime = null; playing = true;
});
document.getElementById('progress-bar').addEventListener('click', e => {
  const rect = e.target.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  elapsed = pct * TOTAL_DURATION;
  lastTime = null;
});

// Start
requestAnimationFrame(render);
</script>
